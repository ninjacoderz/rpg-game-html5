<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Laboratory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #000000, #0a0a1a);
        }
        #canvas1 {
            border: 0px solid white;
        }
        #mutateBtn {
            margin-top: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 16px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #mutateBtn:hover {
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <button id="mutateBtn">New Mutation</button>

<script>
const canvas = document.getElementById("canvas1");
const ctx = canvas.getContext("2d");
const mutateBtn  = document.getElementById('mutateBtn');

const SIZE = 700;
canvas.height = SIZE;
canvas.width = SIZE;
ctx.lineCap = 'round';
ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
ctx.shadowBlur = 10;
ctx.shadowOffsetX = 3;
ctx.shadowOffsetY = 3;

class Fractal {
    constructor(){
        // properties
        this.lineWidth = Math.floor(Math.random() * 11) + 4;
        this.hue = Math.random() * 360;
        this.sides = Math.floor(Math.random() * 6) + 2;
        this.maxLevel = 4;
        this.spread = Math.random() * 0.5 + 0.4;
        this.scale = Math.random() * 0.1 + 0.7;
        this.branches = 3;
        this.branchSize = 110;
    }
    draw(ctx){
        ctx.clearRect(0, 0, SIZE, SIZE);
        ctx.lineWidth = this.lineWidth;
        ctx.save();
        ctx.translate(SIZE/2, SIZE/2);
        for (let i = 0; i < this.sides; i++){
            this.drawBranch(ctx, 0);
            ctx.rotate(Math.PI * 2 / this.sides);
        }
        ctx.restore();
    }
    drawBranch(ctx, level){
        if (level > this.maxLevel) return;

        const lightness = 10 + level * 10;
        ctx.strokeStyle = `hsl(${this.hue}, 100%, ${lightness}%)`;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(this.branchSize, 0);
        ctx.stroke(); 

        for (let i = 0; i < this.branches; i++){
            const position = this.branchSize - (this.branchSize / this.branches) * i;
            ctx.save();
            ctx.translate(position, 0);
            ctx.scale(this.scale, this.scale);
            ctx.rotate(this.spread * 2.1 * i / this.branches - this.spread * 0.95);
            this.drawBranch(ctx, level + 1);
            ctx.restore();
        }
    }
}

function drawFractal(){
    const fractal = new Fractal();
    fractal.draw(ctx);
}

drawFractal();
mutateBtn.addEventListener('click', drawFractal);
</script>
</body>
</html>
