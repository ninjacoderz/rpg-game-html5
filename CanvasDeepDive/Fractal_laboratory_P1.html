<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Laboratory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: black;
        }
        #canvas1 {
            border: 2px solid white;
        }
        #mutateBtn {
            margin-top: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 16px;
            color: white;
            cursor: pointer;
        }
        #mutateBtn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <button id="mutateBtn">New Mutation</button>

<script>
const canvas = document.getElementById("canvas1");
const ctx = canvas.getContext("2d");
const mutateBtn  = document.getElementById('mutateBtn');

const SIZE = 600;
canvas.height = SIZE;
canvas.width = SIZE;
ctx.lineCap = 'round';
ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
ctx.shadowBlur = 10;
ctx.shadowOffsetX = 3;
ctx.shadowOffsetY = 3;

function drawFractal(){
    // properties
    const lineWidth = Math.floor(Math.random() * 11) + 4;
    const hue = Math.random() * 360;
    const sides = 5;
    const maxLevel = 4;
    const spread = Math.random() * 4 - 2;
    const scale = Math.random() * 0.1 + 0.6;
    const branches = Math.floor(Math.random() * 2) + 2;

    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.lineWidth = lineWidth;
    ctx.save();
    ctx.translate(SIZE/2, SIZE/2);
    for (let i = 0; i < sides; i++){
        drawBranch(0, maxLevel, spread, scale, branches, hue);
        ctx.rotate(Math.PI * 2 / sides);
    }
    ctx.restore();
}

function drawBranch(level, maxLevel, spread, scale, branches, hue){
    if (level > maxLevel) return;
    const branchSize = 110;
    const lightness = 10 + level * 10;
    ctx.strokeStyle = `hsl(${hue}, 100%, ${lightness}%)`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(branchSize, 0);
    ctx.stroke(); 

    for (let i = 0; i < branches; i++){
        const position = branchSize - (branchSize / branches) * i;
        ctx.save();
        ctx.translate(position, 0);
        ctx.scale(scale, scale);
        ctx.rotate(spread);
        drawBranch(level + 1, maxLevel, spread, scale, branches, hue);
        ctx.restore();
    }
}

drawFractal();
mutateBtn.addEventListener('click', drawFractal);
</script>
</body>
</html>
